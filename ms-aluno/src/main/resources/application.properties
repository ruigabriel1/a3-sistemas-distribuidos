# Porta em que este microserviço irá rodar (diferente dos outros para execução simultânea)
server.port=8081

# Nome do serviço (útil para logs e identificação)
spring.application.name=ms-aluno

# =============================================
# Configurações de conexão com o banco MySQL
# =============================================
# createDatabaseIfNotExist=true cria o banco automaticamente se não existir
spring.datasource.url=jdbc:mysql://localhost:3306/aluno_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# Configurações do Hibernate (ORM)
# =============================================
# update: atualiza o schema do banco automaticamente com base nas entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =============================================
# Logging — grava erros em arquivo
# =============================================
logging.file.name=../logs/ms-aluno.log
logging.level.root=INFO
logging.level.com.a3=DEBUG
